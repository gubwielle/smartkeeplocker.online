<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Keep Locker</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* CSS Styling for Dark Theme */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            padding: 20px;
        }
        .hero {
            background-image: url('https://source.unsplash.com/random/1920x1080?technology');
            height: 60vh;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .feature-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .card {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .faq {
            margin: 20px 0;
        }
        .footer {
            background: #1e1e1e;
            padding: 20px;
            text-align: center;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Welcome to Smart Keep Locker</h1>
        </div>
        <div class="feature-cards">
            <div class="card">
                <h2>Feature 1</h2>
                <p>Description of Feature 1.</p>
            </div>
            <div class="card">
                <h2>Feature 2</h2>
                <p>Description of Feature 2.</p>
            </div>
            <div class="card">
                <h2>Feature 3</h2>
                <p>Description of Feature 3.</p>
            </div>
        </div>
        <div class="faq">
            <h2>Frequently Asked Questions</h2>
            <div>
                <h3>Question 1</h3>
                <p>Answer to question 1.</p>
            </div>
            <div>
                <h3>Question 2</h3>
                <p>Answer to question 2.</p>
            </div>
        </div>
        <div class="footer">
            <p>Follow us on:</p>
            <a href="#">Facebook</a> | <a href="#">Twitter</a> | <a href="#">Instagram</a>
        </div>
    </div>
</body>
</html>
